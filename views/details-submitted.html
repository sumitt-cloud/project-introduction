<body class="bg-gray-900 text-white">

  <!-- Background Glow -->
  <div class="absolute inset-0 -z-10 animate-fade-in">
    <div class="absolute top-[-100px] left-[50%] w-[600px] h-[600px] bg-purple-600 opacity-20 blur-3xl rounded-full"></div>
    <div class="absolute bottom-[-100px] right-[50%] w-[600px] h-[600px] bg-pink-500 opacity-20 blur-3xl rounded-full"></div>
  </div>

  <!-- Main Container -->
  <div class="min-h-screen flex items-center justify-center px-4">

    <div class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl shadow-2xl p-10 max-w-xl w-full text-center space-y-6 animate-fade-in">

      <!-- Success Icon -->
      <div class="flex justify-center">
        <div class="bg-green-500/20 p-6 rounded-full border border-green-400 animate-bounce">
          <i class="fa-solid fa-check text-green-400 text-4xl"></i>
        </div>
      </div>

      <!-- Heading -->
      <h1 class="text-4xl sm:text-5xl font-bold bg-gradient-to-r from-green-400 to-blue-500 text-transparent bg-clip-text">
        Submitted Successfully!
      </h1>

      <!-- Subtext -->
      <p class="text-gray-400 text-lg">
        Your data has been securely stored. 🔐 <br>
        No one else can access it.
      </p>

      <!-- Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center pt-4">

        <a href="/"
          class="px-6 py-3 rounded-xl bg-white/10 hover:bg-white/20 transition duration-300 font-semibold border border-white/10">
          ⬅ Back to Home
        </a>

        <a href="/details"
          class="px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 hover:scale-105 transition duration-300 font-semibold shadow-lg">
          🔁 Submit Again
        </a>

      </div>

    </div>
  </div>

 

</body>
